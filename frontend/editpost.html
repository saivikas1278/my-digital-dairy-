<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Edit Post - My Diary</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.6/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-4Q6Gf2aSP4eDXB8Miphtr37CMZZQ5oXLH2yaXMJ2w8e2ZtHTl7GptT4jmndRuHDT" crossorigin="anonymous">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Edu+SA+Hand:wght@400..700&display=swap" rel="stylesheet">
    <style>
      body{
        font-family: 'Edu SA Hand', cursive; 
        background: url('bgimg.jpg') no-repeat center center fixed;
        background-size: cover;
        min-height: 100vh;
      }
      
      .edit-container {
        max-width: 600px;
        margin: 40px auto;
        padding: 20px;
      }
      
      .edit-card {
        background: rgba(255, 255, 255, 0.95);
        padding: 40px;
        border-radius: 20px;
        box-shadow: 0 8px 32px rgba(0,0,0,0.12), 0 1.5px 4px rgba(0,0,0,0.08);
        border: 1px solid #f3e9d2;
        -webkit-backdrop-filter: blur(10px);
        backdrop-filter: blur(10px);
      }
      
      .edit-form {
        display: none;
      }
      
      .updating-text {
        display: none;
      }
      
      .edit-title {
        font-family: 'Pacifico', cursive;
        color: #174c8e;
        text-align: center;
        margin-bottom: 30px;
        font-size: 2.5rem;
      }
      
      .form-label {
        font-weight: 600;
        color: #174c8e;
        margin-bottom: 8px;
        letter-spacing: 0.5px;
      }
      
      .form-control, .form-select {
        border-radius: 12px;
        border: 2px solid #e0d7c6;
        padding: 12px 16px;
        font-size: 1.1rem;
        transition: border-color 0.3s, box-shadow 0.3s;
        font-family: 'Edu SA Hand', cursive;
      }
      
      .form-control:focus, .form-select:focus {
        border-color: #174c8e;
        box-shadow: 0 0 12px rgba(23, 76, 142, 0.25);
        outline: none;
      }
      
      .btn-update {
        background: linear-gradient(135deg, #28a745 0%, #20c997 100%);
        border: none;
        color: #fff;
        font-weight: 600;
        padding: 14px 0;
        border-radius: 12px;
        font-size: 1.2rem;
        letter-spacing: 1px;
        transition: all 0.3s ease;
        box-shadow: 0 4px 15px rgba(40, 167, 69, 0.3);
      }
      
      .btn-update:hover {
        background: linear-gradient(135deg, #218838 0%, #1abc9c 100%);
        transform: translateY(-2px);
        box-shadow: 0 6px 20px rgba(40, 167, 69, 0.4);
        color: #fff;
      }
      
      .btn-cancel {
        background: linear-gradient(135deg, #6c757d 0%, #495057 100%);
        border: none;
        color: #fff;
        font-weight: 600;
        padding: 14px 0;
        border-radius: 12px;
        font-size: 1.1rem;
        letter-spacing: 1px;
        transition: all 0.3s ease;
      }
      
      .btn-cancel:hover {
        background: linear-gradient(135deg, #5a6268 0%, #343a40 100%);
        transform: translateY(-2px);
        color: #fff;
      }
      
      .back-button {
        position: absolute;
        top: 20px;
        left: 20px;
        z-index: 10;
        border-radius: 25px;
        padding: 10px 20px;
      }
      
      .loading-spinner {
        display: none;
        text-align: center;
        padding: 20px;
      }
      
      .category-select, .mood-select {
        margin-bottom: 20px;
      }
      
      /* Dark mode styles */
      body.dark-mode {
        background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      }
      
      body.dark-mode .edit-card {
        background: rgba(30, 30, 50, 0.95);
        border-color: #444;
        color: #e0e0e0;
      }
      
      body.dark-mode .edit-title {
        color: #7db8ff;
      }
      
      body.dark-mode .form-label {
        color: #7db8ff;
      }
      
      body.dark-mode .form-control,
      body.dark-mode .form-select {
        background: rgba(40, 40, 60, 0.8);
        border-color: #555;
        color: #e0e0e0;
      }
      
      body.dark-mode .form-control:focus,
      body.dark-mode .form-select:focus {
        border-color: #7db8ff;
        box-shadow: 0 0 12px rgba(125, 184, 255, 0.4);
      }
    </style>
  </head>
  <body>
    <a href="feedpage.html" class="btn btn-outline-primary position-absolute back-button">
      &larr; Back to Feed
    </a>

    <div class="edit-container">
      <div class="edit-card">
        <h1 class="edit-title">✏️ Edit Your Post</h1>
        
        <div class="loading-spinner" id="loadingSpinner">
          <div class="spinner-border text-primary" role="status">
            <span class="visually-hidden">Loading...</span>
          </div>
          <p class="mt-2">Loading post details...</p>
        </div>

        <form id="editForm" class="edit-form">
          <div class="row mb-3">
            <div class="col-md-6">
              <label for="editDate" class="form-label">📅 Date</label>
              <input type="date" class="form-control" id="editDate" name="date" required>
            </div>
            <div class="col-md-6">
              <label for="editMood" class="form-label">😊 Today's Mood</label>
              <select class="form-select mood-select" id="editMood" name="mood">
                <option value="😊">😊 Happy</option>
                <option value="😢">😢 Sad</option>
                <option value="😴">😴 Tired</option>
                <option value="😡">😡 Angry</option>
                <option value="😍">😍 Excited</option>
                <option value="🤔">🤔 Thoughtful</option>
                <option value="😰">😰 Anxious</option>
                <option value="🥳">🥳 Celebratory</option>
                <option value="😌">😌 Peaceful</option>
                <option value="🤒">🤒 Unwell</option>
              </select>
            </div>
          </div>

          <div class="mb-3">
            <label for="editTitle" class="form-label">📝 Post Title</label>
            <input type="text" class="form-control" id="editTitle" name="title" placeholder="Enter your post title..." required>
          </div>
          
          <div class="mb-3">
            <label for="editCategory" class="form-label">📂 Category</label>
            <select class="form-select category-select" id="editCategory" name="category">
              <option value="personal">📝 Personal</option>
              <option value="work">💼 Work</option>
              <option value="travel">✈️ Travel</option>
              <option value="health">🏥 Health</option>
              <option value="goals">🎯 Goals</option>
              <option value="gratitude">🙏 Gratitude</option>
              <option value="other">📌 Other</option>
            </select>
          </div>
          
          <div class="mb-4">
            <label for="editContent" class="form-label">✍️ Your Story</label>
            <textarea class="form-control" id="editContent" name="content" rows="12" placeholder="Update your thoughts, experiences, and reflections..."></textarea>
          </div>
          
          <div class="row g-3">
            <div class="col-md-8">
              <button type="submit" class="btn btn-update w-100" id="updateButton">
                <span id="updateText">✅ Update Post</span>
                <span id="updatingText" class="updating-text">
                  <span class="spinner-border spinner-border-sm me-2" role="status"></span>
                  Updating...
                </span>
              </button>
            </div>
            <div class="col-md-4">
              <button type="button" class="btn btn-cancel w-100" onclick="window.history.back()">
                ❌ Cancel
              </button>
            </div>
          </div>
        </form>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js" integrity="sha384-I7E8VVD/ismYTF4hNIPjVp/Zjvgyol6VFvRkX/vR+Vc4jQkC+hVqc2pM8ODewa9r" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.6/dist/js/bootstrap.min.js" integrity="sha384-RuyvpeZCxMJCqVUGFI0Do1mQrods/hhxYlcVfGPOfQtPJh0JCw12tUAZ/Mv10S7D" crossorigin="anonymous"></script>
    
    <script>
      // Check for dark mode preference
      const isDarkMode = localStorage.getItem('darkMode') === 'true';
      if (isDarkMode) {
        document.body.classList.add('dark-mode');
      }

      // Get post ID from URL
      function getPostIdFromUrl() {
        const params = new URLSearchParams(window.location.search);
        return params.get('id');
      }

      // Load post data
      async function loadPostForEdit() {
        const postId = getPostIdFromUrl();
        if (!postId) {
          alert('No post ID provided');
          window.location.href = 'feedpage.html';
          return;
        }

        try {
          const response = await fetch(`http://localhost:20000/posts/${postId}`);
          if (!response.ok) {
            throw new Error('Post not found');
          }
          
          const post = await response.json();
          
          // Populate form fields
          document.getElementById('editDate').value = post.date || '';
          document.getElementById('editTitle').value = post.title || '';
          document.getElementById('editContent').value = post.content || '';
          document.getElementById('editCategory').value = post.category || 'personal';
          document.getElementById('editMood').value = post.mood || '😊';
          
          // Hide loading, show form
          document.getElementById('loadingSpinner').style.display = 'none';
          document.getElementById('editForm').classList.remove('edit-form');
          document.getElementById('editForm').style.display = 'block';
          
        } catch (error) {
          console.error('Error loading post:', error);
          alert('Error loading post: ' + error.message);
          window.location.href = 'feedpage.html';
        }
      }

      // Handle form submission
      document.getElementById('editForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        
        const postId = getPostIdFromUrl();
        const updateButton = document.getElementById('updateButton');
        const updateText = document.getElementById('updateText');
        const updatingText = document.getElementById('updatingText');
        
        // Show loading state
        updateButton.disabled = true;
        updateText.style.display = 'none';
        updatingText.classList.remove('updating-text');
        updatingText.style.display = 'inline';

        try {
          const formData = new FormData(e.target);
          const postData = Object.fromEntries(formData.entries());

          const response = await fetch(`http://localhost:20000/posts/${postId}`, {
            method: 'PUT',
            headers: {
              'Content-Type': 'application/json'
            },
            body: JSON.stringify(postData)
          });

          if (response.ok) {
            // Show success message
            alert('✅ Post updated successfully!');
            // Redirect back to feed
            window.location.href = 'feedpage.html';
          } else {
            throw new Error('Failed to update post');
          }
          
        } catch (error) {
          console.error('Error updating post:', error);
          alert('❌ Error updating post: ' + error.message);
        } finally {
          // Reset button state
          updateButton.disabled = false;
          updateText.style.display = 'inline';
          updatingText.style.display = 'none';
          updatingText.classList.add('updating-text');
        }
      });

      // Auto-resize textarea
      const textarea = document.getElementById('editContent');
      textarea.addEventListener('input', function() {
        this.style.height = 'auto';
        this.style.height = Math.min(this.scrollHeight, 400) + 'px';
      });

      // Load post when page loads
      window.onload = loadPostForEdit;
    </script>
  </body>
</html>
