<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Register - My Diary</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.6/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-4Q6Gf2aSP4eDXB8Miphtr37CMZZQ5oXLH2yaXMJ2w8e2ZtHTl7GptT4jmndRuHDT" crossorigin="anonymous">
    <link rel="stylesheet" href="neobrutalism.css">
    <script src="neo-popup.js"></script>
    <script src="config.js"></script>
  </head>
  <body class="d-flex justify-content-center align-items-center vh-100">
  

   
   
<form action="" id="registerform">
  <div class="neo-card">
    <div class="card-body">
      <h5 class="card-title text-center">welcome</h5>
      <p class="card-text text-center">please register to continue</p>
      <div class="mb-3">
  <label for="nameInput" class="form-label">Name</label>
  <input type="text" class="form-control" id="nameInput" name="name" required>
</div>
      <div class="mb-3">
        <label for="emailInput" class="form-label">Email address</label>
        <input type="email" class="form-control" id="emailInput" placeholder="name@example.com" name="email" required>
      </div>
      <label for="inputPassword" class="form-label">Set Password</label>
      <input type="password" name="password" class="form-control" id="inputPassword" aria-describedby="passwordHelpBlock" required>
      <div id="passwordHelpBlock" class="form-text"></div>
      <p>already have an account?? <a href="login.html">log-in</a></p>
      <button type="submit" class="neo-btn w-100" id="loginbutton" >Register</button>
    </div>
  </div>
</form>



    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js" integrity="sha384-I7E8VVD/ismYTF4hNIPjVp/Zjvgyol6VFvRkX/vR+Vc4jQkC+hVqc2pM8ODewa9r" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.6/dist/js/bootstrap.min.js" integrity="sha384-RuyvpeZCxMJCqVUGFI0Do1mQrods/hhxYlcVfGPOfQtPJh0JCw12tUAZ/Mv10S7D" crossorigin="anonymous"></script>


<script>
  document.getElementById('registerform').addEventListener('submit', async (e) => {
    e.preventDefault();
    const email = document.getElementById('emailInput').value;
    const password = document.getElementById('inputPassword').value;
    const name = document.getElementById('nameInput').value;

    const response = await fetch(API_BASE_URL + '/registerform', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ name, email, password })
    });

    const result = await response.text();

    if (response.ok && result.toLowerCase().includes('success')) {
      showNeoPopup(result, 'success', 'login.html');
    } else {
      showNeoPopup(result, 'error');
    }
  });

  if (localStorage.getItem('darkMode') === 'true') {
    document.body.classList.add('dark-mode');
  }
</script>

</body>
</html>
