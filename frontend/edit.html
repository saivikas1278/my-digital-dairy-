<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Edit Post - My Diary</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.6/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-4Q6Gf2aSP4eDXB8Miphtr37CMZZQ5oXLH2yaXMJ2w8e2ZtHTl7GptT4jmndRuHDT" crossorigin="anonymous">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Edu+SA+Hand:wght@400..700&display=swap" rel="stylesheet">
    <style>
      body{
        font-family: 'Edu SA Hand', cursive; 
        background: url('bgimg.jpg') no-repeat center center fixed;
        background-size: cover;
      }
      #confirmbutton {
        background: linear-gradient(90deg, #28a745 0%, #20c997 100%);
        border: none;
        color: #fff;
        font-weight: 600;
        transition: background 0.3s, box-shadow 0.3s;
        box-shadow: 0 2px 8px rgba(40,167,69,0.15);
      }
       #confirmbutton:hover, #confirmbutton:focus {
        background: linear-gradient(90deg, #218838 0%, #1abc9c 100%);
        box-shadow: 0 4px 16px rgba(40,167,69,0.25);
        color: #fff;
      }
   
      #formdiv {
        background: #fffbe9;
        padding: 32px 28px;
        border-radius: 18px;
        box-shadow: 0 8px 32px rgba(0,0,0,0.12), 0 1.5px 4px rgba(0,0,0,0.08);
        border: 1px solid #f3e9d2;
        max-width: 500px;
        width: 100%;
        margin: 0 auto;
        transition: box-shadow 0.3s;
      }

      #formdiv:hover {
        box-shadow: 0 12px 40px rgba(0,0,0,0.18), 0 2px 8px rgba(0,0,0,0.10);
      }

      #formdiv label {
        font-weight: 600;
        color: #007bffbb;
        margin-bottom: 6px;
        letter-spacing: 0.5px;
      }

      #formdiv .form-control {
        border-radius: 8px;
        border: 1px solid #d1d5db;
        transition: border-color 0.2s, box-shadow 0.2s;
        font-size: 1.05rem;
      }

      #formdiv .form-control:focus {
        border-color: #007bff;
        box-shadow: 0 0 0 2px rgba(0,123,255,0.15);
        background: #f0f7ff;
      }

      #formdiv .form-select {
        border-radius: 8px;
        border: 1px solid #d1d5db;
        transition: border-color 0.2s, box-shadow 0.2s;
        font-size: 1.05rem;
      }

      #formdiv .form-select:focus {
        border-color: #007bff;
        box-shadow: 0 0 0 2px rgba(0,123,255,0.15);
        background: #f0f7ff;
      }

      #confirmbutton {
        margin-top: 12px;
        font-size: 1.1rem;
        border-radius: 8px;
        padding: 10px 0;
        letter-spacing: 1px;
      }

      .back-button {
        position: absolute;
        top: 20px;
        left: 20px;
        z-index: 10;
        border-radius: 25px;
        padding: 10px 20px;
      }

      .edit-form {
        width: 500px;
        max-width: 90vw;
      }

      .loading-spinner {
        display: none;
        text-align: center;
        padding: 40px;
        background: rgba(255,255,255,0.9);
        border-radius: 18px;
        margin: 20px auto;
        max-width: 500px;
      }

      .page-title {
        text-align: center;
        margin: 20px 0;
        font-family: 'Pacifico', cursive;
        color: #174c8e;
        font-size: 2.5rem;
      }

      /* Dark mode styles */
      body.dark-mode {
        background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      }

      body.dark-mode #formdiv {
        background: rgba(30, 30, 50, 0.95);
        border-color: #444;
        color: #e0e0e0;
      }

      body.dark-mode #formdiv label {
        color: #7db8ff;
      }

      body.dark-mode #formdiv .form-control,
      body.dark-mode #formdiv .form-select {
        background: rgba(40, 40, 60, 0.8);
        border-color: #555;
        color: #e0e0e0;
      }

      body.dark-mode #formdiv .form-control:focus,
      body.dark-mode #formdiv .form-select:focus {
        border-color: #7db8ff;
        background: rgba(30, 30, 50, 0.9);
        box-shadow: 0 0 0 2px rgba(125, 184, 255, 0.25);
      }

      body.dark-mode .page-title {
        color: #7db8ff;
      }

      body.dark-mode .loading-spinner {
        background: rgba(30, 30, 50, 0.95);
        color: #e0e0e0;
      }

      .page-title-position {
        top: 80px;
      }

      .loading-text {
        font-size: 1.2rem;
      }

      .form-hidden {
        display: none;
      }

      .updating-text-hidden {
        display: none;
      }
    </style>
  </head>
  <body class="d-flex justify-content-center align-items-center vh-100">
    <!-- Back Button -->
    <a href="feedpage.html" class="btn btn-outline-primary position-absolute back-button">
      &larr; Back to Feed
    </a>

    <!-- Page Title -->
    <div class="page-title position-absolute page-title-position">
      ✏️ Edit Your Story
    </div>

    <!-- Loading Spinner -->
    <div class="loading-spinner" id="loadingSpinner">
      <div class="spinner-border text-primary" role="status">
        <span class="visually-hidden">Loading...</span>
      </div>
      <p class="mt-3 loading-text">Loading your post...</p>
    </div>

    <!-- Edit Form -->
    <form action="" class="edit-form form-hidden" id="formdiv">
      <div class="mb-3">
        <label for="editdate" class="form-label">📅 Date</label>
        <input type="date" class="form-control" id="editdate" name="date" required>
      </div>
      
      <div class="mb-3">
        <label for="edittitle" class="form-label">📝 Post Title</label>
        <input type="text" class="form-control" id="edittitle" placeholder="Title" name="title" required>
      </div>
      
      <div class="row mb-3">
        <div class="col-md-6">
          <label for="editcategory" class="form-label">📂 Category</label>
          <select class="form-select" id="editcategory" name="category">
            <option value="personal">📝 Personal</option>
            <option value="work">💼 Work</option>
            <option value="travel">✈️ Travel</option>
            <option value="health">🏥 Health</option>
            <option value="goals">🎯 Goals</option>
            <option value="gratitude">🙏 Gratitude</option>
            <option value="other">📌 Other</option>
          </select>
        </div>
        <div class="col-md-6">
          <label for="editmood" class="form-label">😊 Today's Mood</label>
          <select class="form-select" id="editmood" name="mood">
            <option value="😊">😊 Happy</option>
            <option value="😢">😢 Sad</option>
            <option value="😴">😴 Tired</option>
            <option value="😡">😡 Angry</option>
            <option value="😍">😍 Excited</option>
            <option value="🤔">🤔 Thoughtful</option>
            <option value="😰">😰 Anxious</option>
            <option value="🥳">🥳 Celebratory</option>
            <option value="😌">😌 Peaceful</option>
            <option value="🤒">🤒 Unwell</option>
          </select>
        </div>
      </div>
      
      <div class="mb-3">
        <label for="editcontent" class="form-label">✍️ Describe your Day</label>
        <textarea class="form-control" id="editcontent" rows="11" name="content" placeholder="Update your thoughts and experiences..."></textarea>
      </div>
      
      <button type="submit" class="btn w-100" id="confirmbutton">
        <span id="confirmText">✅ Confirm Changes</span>
        <span id="updatingText" class="updating-text-hidden">
          <span class="spinner-border spinner-border-sm me-2" role="status"></span>
          Updating...
        </span>
      </button>
    </form>

    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js" integrity="sha384-I7E8VVD/ismYTF4hNIPjVp/Zjvgyol6VFvRkX/vR+Vc4jQkC+hVqc2pM8ODewa9r" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.6/dist/js/bootstrap.min.js" integrity="sha384-RuyvpeZCxMJCqVUGFI0Do1mQrods/hhxYlcVfGPOfQtPJh0JCw12tUAZ/Mv10S7D" crossorigin="anonymous"></script>
    
    <script>
      // Check for dark mode preference
      const isDarkMode = localStorage.getItem('darkMode') === 'true';
      if (isDarkMode) {
        document.body.classList.add('dark-mode');
      }

      // Get post ID from URL
      function getPostIdFromUrl() {
        const params = new URLSearchParams(window.location.search);
        return params.get('id');
      }

      // Load post data for editing
      async function loadPostForEdit() {
        const postId = getPostIdFromUrl();
        if (!postId) {
          alert('❌ No post ID provided');
          window.location.href = 'feedpage.html';
          return;
        }

        try {
          const response = await fetch(`http://localhost:20000/posts/${postId}`);
          if (!response.ok) {
            throw new Error('Post not found');
          }
          
          const post = await response.json();
          
          // Populate form fields with existing data
          document.getElementById('editdate').value = post.date || '';
          document.getElementById('edittitle').value = post.title || '';
          document.getElementById('editcontent').value = post.content || '';
          document.getElementById('editcategory').value = post.category || 'personal';
          document.getElementById('editmood').value = post.mood || '😊';
          
          // Hide loading spinner and show form
          document.getElementById('loadingSpinner').style.display = 'none';
          document.getElementById('formdiv').classList.remove('form-hidden');
          document.getElementById('formdiv').style.display = 'block';
          
          // Focus on title field
          document.getElementById('edittitle').focus();
          
        } catch (error) {
          console.error('Error loading post:', error);
          alert('❌ Error loading post: ' + error.message);
          window.location.href = 'feedpage.html';
        }
      }

      // Handle form submission
      document.getElementById('formdiv').addEventListener('submit', async (e) => {
        e.preventDefault();
        
        const postId = getPostIdFromUrl();
        const confirmButton = document.getElementById('confirmbutton');
        const confirmText = document.getElementById('confirmText');
        const updatingText = document.getElementById('updatingText');
        
        // Show loading state
        confirmButton.disabled = true;
        confirmText.style.display = 'none';
        updatingText.classList.remove('updating-text-hidden');
        updatingText.style.display = 'inline';

        try {
          const formData = new FormData(e.target);
          const postData = Object.fromEntries(formData.entries());

          const response = await fetch(`http://localhost:20000/posts/${postId}`, {
            method: 'PUT',
            headers: {
              'Content-Type': 'application/json'
            },
            body: JSON.stringify(postData)
          });

          if (response.ok) {
            // Show success message
            alert('✅ Post updated successfully!');
            // Redirect back to feed page
            window.location.href = 'feedpage.html';
          } else {
            const errorData = await response.json();
            throw new Error(errorData.message || 'Failed to update post');
          }
          
        } catch (error) {
          console.error('Error updating post:', error);
          alert('❌ Error updating post: ' + error.message);
        } finally {
          // Reset button state
          confirmButton.disabled = false;
          confirmText.style.display = 'inline';
          updatingText.classList.add('updating-text-hidden');
          updatingText.style.display = 'none';
        }
      });

      // Auto-resize textarea based on content
      const textarea = document.getElementById('editcontent');
      textarea.addEventListener('input', function() {
        this.style.height = 'auto';
        this.style.height = Math.min(this.scrollHeight, 300) + 'px';
      });

      // Prevent accidental page leave
      let hasUnsavedChanges = false;
      
      // Track changes
      document.getElementById('formdiv').addEventListener('input', function() {
        hasUnsavedChanges = true;
      });

      // Reset on form submission
      document.getElementById('formdiv').addEventListener('submit', function() {
        hasUnsavedChanges = false;
      });

      // Warn before leaving
      window.addEventListener('beforeunload', function(e) {
        if (hasUnsavedChanges) {
          e.preventDefault();
          e.returnValue = '';
        }
      });

      // Load post data when page loads
      window.onload = loadPostForEdit;
    </script>
  </body>
</html>
