<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Create New Post - My Diary</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.6/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-4Q6Gf2aSP4eDXB8Miphtr37CMZZQ5oXLH2yaXMJ2w8e2ZtHTl7GptT4jmndRuHDT" crossorigin="anonymous">
     <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Edu+SA+Hand:wght@400..700&display=swap" rel="stylesheet">
    <style>
      body{
        font-family: 'Edu SA Hand', cursive; 
        background: linear-gradient(120deg, #f6d365 0%, #fda085 100%);
        background: url('bgimg.jpg') no-repeat center center fixed;
  background-size: cover;
      }
      #postbutton {
        background: linear-gradient(90deg, #007bff 0%, #1365bc 100%);
        border: none;
        color: #fff;
        font-weight: 600;
        transition: background 0.3s, box-shadow 0.3s;
        box-shadow: 0 2px 8px rgba(0,123,255,0.15);
      }
       #postbutton:hover, #postbutton:focus {
      background: linear-gradient(90deg, #0056b3 0%, #174c8e 100%);
      box-shadow: 0 4px 16px rgba(0,123,255,0.25);
      color: #fff;
    }
   
#formdiv {
  background: #fffbe9;
  padding: 32px 28px;
  border-radius: 18px;
  box-shadow: 0 8px 32px rgba(0,0,0,0.12), 0 1.5px 4px rgba(0,0,0,0.08);
  border: 1px solid #f3e9d2;
  max-width: 500px;
  width: 100%;
  margin: 0 auto;
  transition: box-shadow 0.3s;
}

#formdiv:hover {
  box-shadow: 0 12px 40px rgba(0,0,0,0.18), 0 2px 8px rgba(0,0,0,0.10);
}

#formdiv label {
  font-weight: 600;
  color: #007bffbb;
  margin-bottom: 6px;
  letter-spacing: 0.5px;
}

#formdiv .form-control {
  border-radius: 8px;
  border: 1px solid #d1d5db;
  transition: border-color 0.2s, box-shadow 0.2s;
  font-size: 1.05rem;
}

#formdiv .form-control:focus {
  border-color: #007bff;
  box-shadow: 0 0 0 2px rgba(0,123,255,0.15);
  background: #f0f7ff;
}

#postbutton {
  margin-top: 12px;
  font-size: 1.1rem;
  border-radius: 8px;
  padding: 10px 0;
  letter-spacing: 1px;
}

.back-button {
  top: 20px;
  left: 20px;
  z-index: 10;
}

.post-form {
  width: 500px;
  max-width: 90vw;
}
   
    </style>
  </head>
  <body class="d-flex justify-content-center align-items-center vh-100">
    <!-- Navigation Back Button -->
    <a href="feedpage.html" class="btn btn-outline-primary position-absolute back-button">
      &larr; Back to Feed
    </a>


<form action="" class="post-form" id="formdiv">
  <div class="mb-3">
  <label for="postdate" class="form-label">Date</label>
  <input type="date" class="form-control" id="postdate" name="date" required>
</div>
  <div class="mb-3">
    <label for="posttitle" class="form-label">Post - Title</label>
    <input type="text" class="form-control" id="posttitle" placeholder="Title" name="title" required>
  </div>
  
  <div class="row mb-3">
    <div class="col-md-6">
      <label for="category" class="form-label">Category</label>
      <select class="form-select" id="category" name="category">
        <option value="personal">📝 Personal</option>
        <option value="work">💼 Work</option>
        <option value="travel">✈️ Travel</option>
        <option value="health">🏥 Health</option>
        <option value="goals">🎯 Goals</option>
        <option value="gratitude">🙏 Gratitude</option>
        <option value="other">📌 Other</option>
      </select>
    </div>
    <div class="col-md-6">
      <label for="mood" class="form-label">Today's Mood</label>
      <select class="form-select" id="mood" name="mood">
        <option value="😊">😊 Happy</option>
        <option value="😢">😢 Sad</option>
        <option value="😴">😴 Tired</option>
        <option value="😡">😡 Angry</option>
        <option value="😍">😍 Excited</option>
        <option value="🤔">🤔 Thoughtful</option>
        <option value="😰">😰 Anxious</option>
        <option value="🥳">🥳 Celebratory</option>
        <option value="😌">😌 Peaceful</option>
        <option value="🤒">🤒 Unwell</option>
      </select>
    </div>
  </div>
  
  <div class="mb-3">
    <label for="describe" class="form-label">Describe your Day</label>
    <textarea class="form-control" id="exampleFormControlTextarea1" rows="11" name="content" placeholder="What happened today? How are you feeling? What are you grateful for?"></textarea>
  </div>
  <button type="submit" class="btn w-100" id="postbutton">post-my-day</button>
</form>

   <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js" integrity="sha384-I7E8VVD/ismYTF4hNIPjVp/Zjvgyol6VFvRkX/vR+Vc4jQkC+hVqc2pM8ODewa9r" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.6/dist/js/bootstrap.min.js" integrity="sha384-RuyvpeZCxMJCqVUGFI0Do1mQrods/hhxYlcVfGPOfQtPJh0JCw12tUAZ/Mv10S7D" crossorigin="anonymous"></script>
  

<script>
  const form = document.getElementById('formdiv');

  form.addEventListener('submit', async (e) => {
    e.preventDefault();

    const formData = new FormData(form);
const plainData = Object.fromEntries(formData.entries());
plainData.userId = localStorage.getItem('userId'); // <-- Add this line

const response = await fetch('http://localhost:20000/newpost', {
  method: 'POST',
  headers: { 'Content-Type': 'application/json' },
  body: JSON.stringify(plainData)
});

    let data;
    try {
      data = await response.json();
    } catch {
      data = { message: await response.text() };
    }

    if (response.ok) {
      alert(data.message || 'Post submitted!');
      window.location.href = 'feedpage.html';
    } else {
      alert('Post failed: ' + (data.message || 'Unknown error'));
    }
  });
 
</script>

</body>
</html>
