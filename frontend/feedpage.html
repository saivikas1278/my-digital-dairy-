<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>My Diary - Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.6/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="neobrutalism.css">
    <script src="neo-popup.js"></script>
    <script src="config.js"></script>
  </head>
  <body>
    <header style="display: flex; justify-content: space-between; align-items: center; padding: 20px; max-width: 1200px; margin: 0 auto; flex-wrap: wrap; gap: 20px;">
      <!-- Profile -->
      <div id="profile-info" class="profile-info" style="margin: 0;">
        <div class="neo-card profile-card" style="padding: 10px 20px; display: inline-flex; align-items: center; border-radius: 0; background: var(--color-primary); margin: 0;">
          <span class="profile-icon" style="margin-right: 10px; border: 2px solid #000; background: #fff; border-radius: 0; padding: 4px; display: flex;">
            <svg width="22" height="22" fill="#000" viewBox="0 0 16 16"><path d="M10 5a2 2 0 1 1-4 0 2 2 0 0 1 4 0z"/><path fill-rule="evenodd" d="M0 8a8 8 0 1 1 16 0A8 8 0 0 1 0 8zm8-7a7 7 0 0 0-5.468 11.37c.69-1.19 2.065-2.37 5.468-2.37 3.403 0 4.778 1.18 5.468 2.37A7 7 0 0 0 8 1z"/></svg>
          </span>
          <span id="profile-name" class="profile-name" style="font-weight: 700; font-size: 1.2rem; text-transform: uppercase;"></span>
        </div>
      </div>

      <!-- Title -->
      <h1 class="main-title" style="margin: 0; text-align: center; flex: 1; min-width: 200px;">
        <span class="title-gradient">Happy Day</span>
      </h1>

      <!-- Actions -->
      <div class="header-actions" style="display: flex; gap: 15px; align-items: center;">
        <a class="neo-btn new-post-btn" href="post.html" style="margin: 0;">New Post</a>
        <a class="neo-btn" href="games.html" style="margin: 0; background-color: var(--color-tertiary);">Play Games</a>
        <div class="top-right-actions" style="display: flex; gap: 10px;">
          <button id="darkModeToggle" class="neo-btn neo-btn-secondary dark-mode-toggle" style="padding: 10px 15px; margin: 0;">
            <span id="darkModeIcon">🌙</span>
          </button>
          <a class="neo-btn neo-btn-danger logout-btn" href="index.html" onclick="localStorage.removeItem('isLoggedIn')" style="margin: 0;">Log out</a>
        </div>
      </div>
    </header>

    <!-- Search and Filter Section -->
    <div class="search-filter-container" style="max-width: 800px; margin: 20px auto;">
      <div class="row g-3">
        <div class="col-12 col-md-4">
          <input type="text" id="searchInput" class="form-control search-input" placeholder="🔍 Search posts by title or content...">
        </div>
        <div class="col-6 col-md-3">
          <select id="categoryFilter" class="form-select sort-select" title="Filter by category">
            <option value="">📂 All Categories</option>
            <option value="personal">📝 Personal</option>
            <option value="work">💼 Work</option>
            <option value="travel">✈️ Travel</option>
            <option value="health">🏥 Health</option>
            <option value="goals">🎯 Goals</option>
            <option value="gratitude">🙏 Gratitude</option>
            <option value="other">📌 Other</option>
          </select>
        </div>
        <div class="col-6 col-md-3">
          <select id="sortSelect" class="form-select sort-select" title="Sort posts by">
            <option value="newest">📅 Newest First</option>
            <option value="oldest">📅 Oldest First</option>
            <option value="title">🔤 By Title</option>
          </select>
        </div>
        <div class="col-12 col-md-2">
          <button id="clearSearch" class="neo-btn neo-btn-secondary w-100 clear-btn">Clear</button>
        </div>
      </div>
    </div>

    <!-- Stats Section -->
    <div class="stats-container" style="text-align: center; margin-bottom: 20px;">
      <span id="postStats" class="stats-text" style="display: inline-block; padding: 10px; border: 3px solid #000; box-shadow: 4px 4px 0px #000; background: var(--color-tertiary); font-weight: 700;">📝 Loading posts...</span>
    </div>
    <div class="allposts" style="max-width: 800px; margin: 0 auto; display: flex; flex-direction: column; gap: 20px;">
      <!-- Posts will be loaded here dynamically -->
    </div>
    


    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.6/dist/js/bootstrap.min.js"></script>
    <script>
      async function loadPosts() {
       const userId = localStorage.getItem('userId');      try {
        const response = await fetch(`${API_BASE_URL}/posts?userId=${userId}`);
        const posts = await response.json();
        window.allPosts = posts; // Store all posts globally for filtering
        displayPosts(posts);
        updateStats(posts.length);
      } catch (err) {
        console.error(err);
      }
      }

      function escapeHTML(str) {
        if (!str) return '';
        return str
          .replace(/&/g, '&amp;')
          .replace(/</g, '&lt;')
          .replace(/>/g, '&gt;')
          .replace(/"/g, '&quot;')
          .replace(/'/g, '&#039;');
      }

      function displayPosts(posts) {
        const container = document.querySelector('.allposts');
        container.innerHTML = '';
        
        if (posts.length === 0) {
          container.innerHTML = `
            <div class="neo-card empty-state" style="text-align: center;">
              <div style="font-size: 4rem; margin-bottom: 20px;">📖</div>
              <h3 style="margin-bottom: 15px;">No posts found</h3>
              <p style="font-size: 1.2rem; margin-bottom: 20px; font-weight: 600;">
                ${document.getElementById('searchInput').value ? 'Try adjusting your search or filters' : 'Start your journaling journey by creating your first post!'}
              </p>
              <a href="post.html" class="neo-btn">
                ✨ Create Your First Post
              </a>
            </div>
          `;
          return;
        }

      posts.forEach(post => {
        const preview = post.content.length > 100 ? post.content.substring(0, 100) + '...' : post.content;
        const wordCount = post.content.split(' ').length;
        const categoryIcon = getCategoryIcon(post.category);
        const mood = post.mood || '😊';
        
        container.innerHTML += `
        <div class="post" data-id="${post._id}" data-category="${post.category || 'personal'}">
          <div class="post-meta" style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
            <span class="category-badge" style="background: ${getCategoryColor(post.category)};">${categoryIcon} ${(post.category || 'personal').toUpperCase()}</span>
            <span class="mood-indicator" title="Mood: ${mood}" style="font-size: 1.8rem;">${mood}</span>
          </div>
          <h1 style="margin-bottom: 20px;">${escapeHTML(post.title)}</h1>
          <p style="font-size: 1.1rem; line-height: 1.6; margin-bottom: 30px;">${escapeHTML(preview).replace(/\n/g, '<br>')}</p>
          <div class="post-actions" style="display: flex; gap: 15px; margin-bottom: 30px; flex-wrap: wrap;">
            <a class="neo-btn" href="dedicatedpage.html?id=${post._id}" style="margin: 0;">View post</a>
            <button class="neo-btn neo-btn-warning edit-post" style="margin: 0;">Edit</button>
            <button class="neo-btn neo-btn-danger delete-post" style="margin: 0;">Delete</button>
          </div>
          <div style="display: flex; justify-content: space-between; padding-top: 20px; border-top: 4px solid var(--color-dark); font-weight: 700; text-transform: uppercase;">
            <span class="post-date">${post.date ? post.date : ''}</span>
            <span class="word-count">${wordCount} words</span>
          </div>
        </div>
        `;
      });
      }


      function getCategoryIcon(category) {
        const icons = {
          'personal': '📝',
          'work': '💼',
          'travel': '✈️',
          'health': '🏥',
          'goals': '🎯',
          'gratitude': '🙏',
          'other': '📌'
        };
        return icons[category] || '📝';
      }

      function getCategoryColor(category) {
        const colors = {
          'personal': '#6c757d',
          'work': '#007bff',
          'travel': '#28a745',
          'health': '#dc3545',
          'goals': '#ffc107',
          'gratitude': '#17a2b8',
          'other': '#6f42c1'
        };
        return colors[category] || '#6c757d';
      }

      function updateStats(count) {
        const statsEl = document.getElementById('postStats');
        statsEl.textContent = `📝 ${count} ${count === 1 ? 'post' : 'posts'} found`;
      }

      // Search and Filter Functions
      function filterPosts() {
        const searchTerm = document.getElementById('searchInput').value.toLowerCase();
        const sortOption = document.getElementById('sortSelect').value;
        const categoryFilter = document.getElementById('categoryFilter').value;
        
        let filteredPosts = window.allPosts.filter(post => {
          const matchesSearch = post.title.toLowerCase().includes(searchTerm) || 
                               post.content.toLowerCase().includes(searchTerm);
          const matchesCategory = !categoryFilter || (post.category || 'personal') === categoryFilter;
          return matchesSearch && matchesCategory;
        });

        // Sort posts
        switch(sortOption) {
          case 'oldest':
            filteredPosts.sort((a, b) => new Date(a.date) - new Date(b.date));
            break;
          case 'title':
            filteredPosts.sort((a, b) => a.title.localeCompare(b.title));
            break;
          case 'newest':
          default:
            filteredPosts.sort((a, b) => new Date(b.date) - new Date(a.date));
            break;
        }

        displayPosts(filteredPosts);
        updateStats(filteredPosts.length);
      }

      // Event Listeners
      document.getElementById('searchInput').addEventListener('input', filterPosts);
      document.getElementById('categoryFilter').addEventListener('change', filterPosts);
      document.getElementById('sortSelect').addEventListener('change', filterPosts);
      document.getElementById('clearSearch').addEventListener('click', () => {
        document.getElementById('searchInput').value = '';
        document.getElementById('categoryFilter').value = '';
        document.getElementById('sortSelect').value = 'newest';
        filterPosts();
      });

      // Dark Mode Toggle
      const darkModeToggle = document.getElementById('darkModeToggle');
      const darkModeIcon = document.getElementById('darkModeIcon');
      
      // Check for saved dark mode preference
      const isDarkMode = localStorage.getItem('darkMode') === 'true';
      if (isDarkMode) {
        document.body.classList.add('dark-mode');
        darkModeIcon.textContent = '☀️';
      }

      darkModeToggle.addEventListener('click', () => {
        document.body.classList.toggle('dark-mode');
        const isNowDark = document.body.classList.contains('dark-mode');
        darkModeIcon.textContent = isNowDark ? '☀️' : '🌙';
        localStorage.setItem('darkMode', isNowDark);
      });

document.addEventListener('click', async function(e) {
  // Delete post
  if (e.target.classList.contains('delete-post')) {
    const postDiv = e.target.closest('.post');
    const postId = postDiv.getAttribute('data-id');
      if (confirm('Are you sure you want to delete this post?')) {
        const res = await fetch(`${API_BASE_URL}/posts/${postId}`, { method: 'DELETE' });
        if (res.ok) {
        // Remove from allPosts array
        window.allPosts = window.allPosts.filter(post => post._id !== postId);
        filterPosts(); // Refresh display
        showNeoPopup('Post deleted!', 'success');
      } else {
        showNeoPopup('Failed to delete post.', 'error');
      }
    }
  }

  // Edit post
  if (e.target.classList.contains('edit-post')) {
    const postDiv = e.target.closest('.post');
    const postId = postDiv.getAttribute('data-id');
    // Redirect to edit page with post ID
    window.location.href = `edit.html?id=${postId}`;
  }
});

      window.onload = loadPosts;

      // Refresh posts when page becomes visible (returning from edit page)
      document.addEventListener('visibilitychange', function() {
        if (!document.hidden) {
          loadPosts();
        }
      });

      // Also refresh when window gains focus
      window.addEventListener('focus', function() {
        loadPosts();
      });
    </script>
    <script>
  // Show email in profile section
 document.getElementById('profile-name').textContent = localStorage.getItem('name') || 'Unknown';
</script>
  </body>
</html>
