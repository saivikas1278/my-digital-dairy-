<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>My Diary - Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.6/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Edu+SA+Hand:wght@400..700&family=Oswald:wght@200..700&family=Pacifico&display=swap" rel="stylesheet">
    <script>
      if (localStorage.getItem('isLoggedIn') !== 'true') {
        window.location.href = 'login.html';
      }
    </script>
    <style>
      body {
        font-family: 'Edu SA Hand', cursive;
        background: url('bgimg.jpg') no-repeat center center fixed;
        background-size: cover;
      }
      .allposts {
        max-width: 700px;
        margin: 40px auto;
        display: flex;
        flex-direction: column;
        gap: 32px;
      }
      .post {
  background: rgba(255, 255, 255, 0.85);
  border-radius: 22px;
  box-shadow: 0 8px 32px rgba(23,76,142,0.12), 0 2px 8px rgba(0,0,0,0.10);
  padding: 2.5rem 2rem;
  border: 1.5px solid #e0d7c6;
  position: relative;
  overflow: hidden;
  transition: box-shadow 0.3s, transform 0.3s, border 0.3s;
  word-break: break-word;
  backdrop-filter: blur(2px);
  animation: fadeInUp 0.7s cubic-bezier(.39,.575,.56,1.000);
}
.post:hover {
  box-shadow: 0 16px 48px rgba(23,76,142,0.18), 0 4px 16px rgba(0,0,0,0.12);
  transform: translateY(-8px) scale(1.025);
  border: 2px solid #174c8e;
  background: rgba(255,255,255,0.97);
}
.post h1 {
  font-size: 2.1rem;
  color: #174c8e;
  margin-bottom: 14px;
  font-family: 'Pacifico', cursive;
  letter-spacing: 1px;
  text-shadow: 1px 2px 8px #f3e9d2;
}
.post p {
  font-size: 1.15rem;
  color: #333;
  margin-bottom: 0;
  font-family: 'Edu SA Hand', cursive;
  line-height: 1.7;
  letter-spacing: 0.5px;
}
@keyframes fadeInUp {
  0% { opacity: 0; transform: translateY(40px);}
  100% { opacity: 1; transform: translateY(0);}
}
      .viwepost {
        background: linear-gradient(90deg, #007bff 0%, #1365bc 100%);
        color: #fff;
        border: none;
        border-radius: 8px;
        font-weight: 600;
        padding: 10px 0;
        width: 150px;
        margin-top: 18px;
        letter-spacing: 1px;
        box-shadow: 0 2px 8px rgba(0,123,255,0.10);
        transition: background 0.3s, box-shadow 0.3s, transform 0.2s;
        font-family: Pacifico, 'Edu SA Hand', cursive;
        display: block;
      }
      .viwepost:hover, .viwepost:focus {
        background: linear-gradient(135deg, #45a049, #2d6a2d);
        box-shadow: 0 4px 16px rgba(76,175,80,0.25);
        color: #fff;
        transform: translateY(-2px) scale(1.02);
      }
.post-date {
  position: absolute;
  right: 24px;
  bottom: 18px;
  font-size: 0.98rem;
  color: #888;
  font-family: 'Oswald', sans-serif;
  opacity: 0.85;
  letter-spacing: 0.5px;
}
.post {
  position: relative; /* Make sure .post is relative for absolute positioning */
}

 @keyframes fadeIn {
    0% { opacity: 0; transform: translateY(-20px); }
    100% { opacity: 1; transform: translateY(0); }
  }

  .animate-fadeIn {
    animation: fadeIn 1s ease-out forwards;
  }


  .edit-btn:hover {
  background: linear-gradient(135deg, #ffb300, #ff8f00) !important;
  color: #fff !important;
  transform: scale(1.05);
  box-shadow: 0 4px 15px rgba(255, 193, 7, 0.4) !important;
}

.delete-btn:hover {
  background: linear-gradient(135deg, #c82333, #a71e2a) !important;
  color: #fff !important;
  transform: scale(1.05);
  box-shadow: 0 4px 15px rgba(220, 53, 69, 0.4) !important;
}

.view-btn:hover {
  background: linear-gradient(135deg, #45a049, #2d6a2d) !important;
  color: #fff !important;
  transform: scale(1.05);
  box-shadow: 0 4px 15px rgba(76, 175, 80, 0.4) !important;
}

.search-filter-container {
  max-width: 700px;
  margin: 20px auto;
  padding: 0 20px;
}

.search-input, .sort-select, .clear-btn {
  border-radius: 25px;
  padding: 12px 20px;
  border: 2px solid #e0d7c6;
  font-family: 'Edu SA Hand', cursive;
  transition: border-color 0.3s, box-shadow 0.3s;
}

.search-input:focus, .sort-select:focus {
  border-color: #174c8e;
  box-shadow: 0 0 8px rgba(23, 76, 142, 0.25);
  outline: none;
}

.stats-container {
  text-align: center;
  margin: 15px auto;
  max-width: 700px;
  padding: 0 20px;
}

.stats-text {
  font-family: 'Oswald', sans-serif;
  color: #174c8e;
  font-size: 1.1rem;
  background: rgba(255, 255, 255, 0.8);
  padding: 8px 16px;
  border-radius: 20px;
  display: inline-block;
  box-shadow: 0 2px 8px rgba(23, 76, 142, 0.15);
}

/* Dark Mode Styles */
body.dark-mode {
  background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
}

body.dark-mode .post {
  background: rgba(30, 30, 50, 0.9);
  border: 1.5px solid #444;
  color: #e0e0e0;
}

body.dark-mode .post:hover {
  background: rgba(40, 40, 60, 0.95);
  border: 2px solid #5a7bd8;
}

body.dark-mode .post h1 {
  color: #7db8ff;
  text-shadow: 1px 2px 8px rgba(125, 184, 255, 0.3);
}

body.dark-mode .post p {
  color: #b0b0b0;
}

body.dark-mode .post-date,
body.dark-mode .word-count {
  color: #888;
}

body.dark-mode .search-input,
body.dark-mode .sort-select,
body.dark-mode .clear-btn {
  background: rgba(30, 30, 50, 0.8);
  border-color: #444;
  color: #e0e0e0;
}

body.dark-mode .search-input:focus,
body.dark-mode .sort-select:focus {
  border-color: #7db8ff;
  box-shadow: 0 0 8px rgba(125, 184, 255, 0.4);
}

body.dark-mode .stats-text {
  background: rgba(30, 30, 50, 0.8);
  color: #7db8ff;
  box-shadow: 0 2px 8px rgba(125, 184, 255, 0.2);
}

.dark-mode-toggle {
  border-radius: 50%;
  width: 45px;
  height: 45px;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  transition: all 0.3s ease;
}

.dark-mode-toggle:hover {
  transform: scale(1.1);
}

/* Profile Section Styles */
.profile-info {
  position: absolute;
  top: 18px;
  left: 24px;
  z-index: 10;
}

.profile-card {
  display: flex;
  align-items: center;
  background: rgba(255,255,255,0.85);
  border-radius: 24px;
  padding: 7px 16px;
  box-shadow: 0 2px 8px rgba(23, 76, 142, 0.13);
}

.profile-icon {
  display: inline-flex;
  width: 36px;
  height: 36px;
  background: #174c8e;
  color: #fff;
  border-radius: 50%;
  align-items: center;
  justify-content: center;
  font-size: 1.4rem;
  margin-right: 10px;
}

.profile-name {
  font-weight: 600;
  color: #174c8e;
  font-family: 'Oswald', sans-serif;
  font-size: 1.08rem;
}

/* Title Styles */
.main-title {
  font-family: 'Pacifico', cursive;
  color: #174c8e;
  text-align: center;
  margin: 24px 0;
}

.title-gradient {
  background: linear-gradient(135deg, #174c8e 0%, #007bff 50%, #5a7bd8 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  font-size: 3rem;
  font-weight: 700;
  text-shadow: 2px 2px 4px rgba(23, 76, 142, 0.1);
}

/* Post Action Styles */
.post-actions {
  margin-top: 18px;
  display: flex;
  gap: 10px;
}

.action-btn {
  width: 100px;
  padding: 6px 0;
  font-weight: 600;
  letter-spacing: 1px;
  border-radius: 7px;
  transition: all 0.2s ease;
}

.view-btn {
  box-shadow: 0 1px 4px rgba(76, 175, 80, 0.33);
}

.edit-btn {
  box-shadow: 0 1px 4px rgba(255, 193, 7, 0.46);
}

.delete-btn {
  box-shadow: 0 1px 4px rgba(220, 53, 69, 0.33);
}

/* Post Meta Styles */
.post-meta {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 10px;
}

.category-badge {
  color: white;
  padding: 4px 12px;
  border-radius: 15px;
  font-size: 0.8rem;
  font-weight: 600;
  text-transform: uppercase;
}

.mood-indicator {
  font-size: 1.5rem;
}

.post-date {
  position: absolute;
  right: 24px;
  bottom: 18px;
  font-size: 0.98rem;
  color: #888;
  font-family: 'Oswald', sans-serif;
  opacity: 0.85;
  letter-spacing: 0.5px;
}

.word-count {
  position: absolute;
  left: 24px;
  bottom: 18px;
  font-size: 0.9rem;
  color: #888;
  font-family: 'Oswald', sans-serif;
}

/* Dark Mode Profile Styles */
body.dark-mode .profile-card {
  background: rgba(30, 30, 50, 0.85);
}

body.dark-mode .profile-name {
  color: #7db8ff;
}

body.dark-mode .main-title {
  color: #7db8ff;
}
      
    </style>

  </head>
  <body>
        <div id="profile-info" class="profile-info">
  <div class="profile-card">
    <span class="profile-icon">
      <svg width="22" height="22" fill="currentColor" viewBox="0 0 16 16"><path d="M10 5a2 2 0 1 1-4 0 2 2 0 0 1 4 0z"/><path fill-rule="evenodd" d="M0 8a8 8 0 1 1 16 0A8 8 0 0 1 0 8zm8-7a7 7 0 0 0-5.468 11.37c.69-1.19 2.065-2.37 5.468-2.37 3.403 0 4.778 1.18 5.468 2.37A7 7 0 0 0 8 1z"/></svg>
    </span>
    <span id="profile-name" class="profile-name"></span>
  </div>
</div>

    <div class="  text-end p-3">
      <button id="darkModeToggle" class="btn btn-outline-secondary me-2 dark-mode-toggle">
        <span id="darkModeIcon">🌙</span>
      </button>
      <a class="btn btn-primary w-25" href="post.html">New Post</a>
      <a class="btn btn-danger w-25" href="login.html" onclick="localStorage.removeItem('isLoggedIn')">Log out</a>
      <h1 class="main-title">
        <span class="title-gradient">Happy Day</span>
      </h1>
    </div>

    <!-- Search and Filter Section -->
    <div class="search-filter-container">
      <div class="row g-3">
        <div class="col-md-4">
          <input type="text" id="searchInput" class="form-control search-input" placeholder="🔍 Search posts by title or content...">
        </div>
        <div class="col-md-3">
          <select id="categoryFilter" class="form-select sort-select" title="Filter by category">
            <option value="">📂 All Categories</option>
            <option value="personal">📝 Personal</option>
            <option value="work">💼 Work</option>
            <option value="travel">✈️ Travel</option>
            <option value="health">🏥 Health</option>
            <option value="goals">🎯 Goals</option>
            <option value="gratitude">🙏 Gratitude</option>
            <option value="other">📌 Other</option>
          </select>
        </div>
        <div class="col-md-3">
          <select id="sortSelect" class="form-select sort-select" title="Sort posts by">
            <option value="newest">📅 Newest First</option>
            <option value="oldest">📅 Oldest First</option>
            <option value="title">🔤 By Title</option>
          </select>
        </div>
        <div class="col-md-2">
          <button id="clearSearch" class="btn btn-outline-secondary w-100 clear-btn">Clear</button>
        </div>
      </div>
    </div>

    <!-- Stats Section -->
    <div class="stats-container">
      <span id="postStats" class="stats-text">📝 Loading posts...</span>
    </div>
    <div class="allposts">
      <!-- Posts will be loaded here dynamically -->
    </div>
    


    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.6/dist/js/bootstrap.min.js"></script>
    <script>
      async function loadPosts() {
       const userId = localStorage.getItem('userId');
const response = await fetch(`http://localhost:20000/posts?userId=${userId}`);
        const posts = await response.json();
        window.allPosts = posts; // Store all posts globally for filtering
        displayPosts(posts);
        updateStats(posts.length);
      }

      function displayPosts(posts) {
        const container = document.querySelector('.allposts');
        container.innerHTML = '';
        
        if (posts.length === 0) {
          container.innerHTML = `
            <div class="empty-state" style="text-align: center; padding: 60px 20px; background: rgba(255,255,255,0.9); border-radius: 20px; box-shadow: 0 4px 20px rgba(0,0,0,0.1);">
              <div style="font-size: 4rem; margin-bottom: 20px;">📖</div>
              <h3 style="color: #174c8e; font-family: 'Pacifico', cursive; margin-bottom: 15px;">No posts found</h3>
              <p style="font-family: 'Edu SA Hand', cursive; color: #666; font-size: 1.2rem; margin-bottom: 20px;">
                ${document.getElementById('searchInput').value ? 'Try adjusting your search or filters' : 'Start your journaling journey by creating your first post!'}
              </p>
              <a href="post.html" class="btn btn-primary" style="font-family: 'Edu SA Hand', cursive; padding: 12px 24px; border-radius: 25px;">
                ✨ Create Your First Post
              </a>
            </div>
          `;
          return;
        }

      posts.forEach(post => {
  const preview = post.content.length > 100 ? post.content.substring(0, 100) + '...' : post.content;
  const wordCount = post.content.split(' ').length;
  const categoryIcon = getCategoryIcon(post.category);
  const mood = post.mood || '😊';
  container.innerHTML += `
  <div class="post" data-id="${post._id}" data-category="${post.category || 'personal'}">
    <div class="post-meta">
      <span class="category-badge" style="background: ${getCategoryColor(post.category)};">${categoryIcon} ${(post.category || 'personal').toUpperCase()}</span>
      <span class="mood-indicator" title="Mood: ${mood}">${mood}</span>
    </div>
    <h1>${post.title}</h1>
    <p>${preview}</p>
    <div class="post-actions">
      <a class="btn viwepost btn-sm d-inline-block action-btn view-btn" href="dedicatedpage.html?id=${post._id}">View post</a>
      <button class="btn btn-warning btn-sm edit-post d-inline-block action-btn edit-btn">Edit</button>
      <button class="btn btn-danger btn-sm delete-post d-inline-block action-btn delete-btn">Delete</button>
    </div>
    <span class="post-date">${post.date ? post.date : ''}</span>
    <span class="word-count">${wordCount} words</span>
  </div>
  `;
});
      }

      function getCategoryIcon(category) {
        const icons = {
          'personal': '📝',
          'work': '💼',
          'travel': '✈️',
          'health': '🏥',
          'goals': '🎯',
          'gratitude': '🙏',
          'other': '📌'
        };
        return icons[category] || '📝';
      }

      function getCategoryColor(category) {
        const colors = {
          'personal': '#6c757d',
          'work': '#007bff',
          'travel': '#28a745',
          'health': '#dc3545',
          'goals': '#ffc107',
          'gratitude': '#17a2b8',
          'other': '#6f42c1'
        };
        return colors[category] || '#6c757d';
      }

      function updateStats(count) {
        const statsEl = document.getElementById('postStats');
        statsEl.textContent = `📝 ${count} ${count === 1 ? 'post' : 'posts'} found`;
      }

      // Search and Filter Functions
      function filterPosts() {
        const searchTerm = document.getElementById('searchInput').value.toLowerCase();
        const sortOption = document.getElementById('sortSelect').value;
        const categoryFilter = document.getElementById('categoryFilter').value;
        
        let filteredPosts = window.allPosts.filter(post => {
          const matchesSearch = post.title.toLowerCase().includes(searchTerm) || 
                               post.content.toLowerCase().includes(searchTerm);
          const matchesCategory = !categoryFilter || (post.category || 'personal') === categoryFilter;
          return matchesSearch && matchesCategory;
        });

        // Sort posts
        switch(sortOption) {
          case 'oldest':
            filteredPosts.sort((a, b) => new Date(a.date) - new Date(b.date));
            break;
          case 'title':
            filteredPosts.sort((a, b) => a.title.localeCompare(b.title));
            break;
          case 'newest':
          default:
            filteredPosts.sort((a, b) => new Date(b.date) - new Date(a.date));
            break;
        }

        displayPosts(filteredPosts);
        updateStats(filteredPosts.length);
      }

      // Event Listeners
      document.getElementById('searchInput').addEventListener('input', filterPosts);
      document.getElementById('categoryFilter').addEventListener('change', filterPosts);
      document.getElementById('sortSelect').addEventListener('change', filterPosts);
      document.getElementById('clearSearch').addEventListener('click', () => {
        document.getElementById('searchInput').value = '';
        document.getElementById('categoryFilter').value = '';
        document.getElementById('sortSelect').value = 'newest';
        filterPosts();
      });

      // Dark Mode Toggle
      const darkModeToggle = document.getElementById('darkModeToggle');
      const darkModeIcon = document.getElementById('darkModeIcon');
      
      // Check for saved dark mode preference
      const isDarkMode = localStorage.getItem('darkMode') === 'true';
      if (isDarkMode) {
        document.body.classList.add('dark-mode');
        darkModeIcon.textContent = '☀️';
      }

      darkModeToggle.addEventListener('click', () => {
        document.body.classList.toggle('dark-mode');
        const isNowDark = document.body.classList.contains('dark-mode');
        darkModeIcon.textContent = isNowDark ? '☀️' : '🌙';
        localStorage.setItem('darkMode', isNowDark);
      });

document.addEventListener('click', async function(e) {
  // Delete post
  if (e.target.classList.contains('delete-post')) {
    const postDiv = e.target.closest('.post');
    const postId = postDiv.getAttribute('data-id');
    if (confirm('Are you sure you want to delete this post?')) {
      const res = await fetch(`http://localhost:20000/posts/${postId}`, { method: 'DELETE' });
      if (res.ok) {
        // Remove from allPosts array
        window.allPosts = window.allPosts.filter(post => post._id !== postId);
        filterPosts(); // Refresh display
        alert('Post deleted!');
      } else {
        alert('Failed to delete post.');
      }
    }
  }

  // Edit post
  if (e.target.classList.contains('edit-post')) {
    const postDiv = e.target.closest('.post');
    const postId = postDiv.getAttribute('data-id');
    // Redirect to edit page with post ID
    window.location.href = `edit.html?id=${postId}`;
  }
});

      window.onload = loadPosts;

      // Refresh posts when page becomes visible (returning from edit page)
      document.addEventListener('visibilitychange', function() {
        if (!document.hidden) {
          loadPosts();
        }
      });

      // Also refresh when window gains focus
      window.addEventListener('focus', function() {
        loadPosts();
      });
    </script>
    <script>
  // Show email in profile section
 document.getElementById('profile-name').textContent = localStorage.getItem('name') || 'Unknown';
</script>
  </body>
</html>
