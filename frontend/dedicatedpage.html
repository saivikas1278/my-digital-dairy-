<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Post Details - My Diary</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.6/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="neobrutalism.css">
    <script src="config.js"></script>
  </head>
  <body>
    <a href="feedpage.html" class="neo-btn neo-btn-secondary position-absolute back-button m-3" style="top: 0; left: 0; z-index: 10;">
      &larr; Back
    </a>
    <div class="post" style="max-width: 800px; margin: 60px auto;">
      <!-- Post content will be loaded here by JS -->
    </div>
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.6/dist/js/bootstrap.min.js"></script>
    <script>
      function getPostIdFromUrl() {
        const params = new URLSearchParams(window.location.search);
        return params.get('id');
      }

      function escapeHTML(str) {
        if (!str) return '';
        return str
          .replace(/&/g, '&amp;')
          .replace(/</g, '&lt;')
          .replace(/>/g, '&gt;')
          .replace(/"/g, '&quot;')
          .replace(/'/g, '&#039;');
      }

      async function loadPost() {
        const postId = getPostIdFromUrl();
        if (!postId) {
          document.querySelector('.post').innerHTML = '<p>Post not found.</p>';
          return;
        }
        try {
          const response = await fetch(`${API_BASE_URL}/posts/${postId}`);
          if (!response.ok) throw new Error('Post not found');
          const post = await response.json();
          const container = document.querySelector('.post');
          container.innerHTML = `
            <h1>${escapeHTML(post.title)}</h1>
            <p style="font-size: 1.2rem; line-height: 1.7; white-space: pre-wrap;">${escapeHTML(post.content)}</p>
          `;
        } catch (error) {
          document.querySelector('.post').innerHTML = `<p>${escapeHTML(error.message)}</p>`;
        }
      }
      // Check dark mode
      if (localStorage.getItem('darkMode') === 'true') {
        document.body.classList.add('dark-mode');
      }

      window.onload = loadPost;
    </script>
  </body>
</html>
