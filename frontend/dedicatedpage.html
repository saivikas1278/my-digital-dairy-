<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Post Details - My Diary</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.6/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Edu+SA+Hand:wght@400..700&family=Oswald:wght@200..700&family=Pacifico&display=swap" rel="stylesheet">
    <style>
      body {
        background: linear-gradient(120deg, #f6d365 0%, #fda085 100%);
        font-family: 'Edu SA Hand', cursive;
        background: url('bgimg.jpg') no-repeat center center fixed;
        background-size: cover;
        min-height: 100vh;
        margin: 0;
      }
      .post {
        background: #fffbe9;
        border-radius: 18px;
        box-shadow: 0 4px 24px rgba(0,0,0,0.10), 0 1.5px 4px rgba(0,0,0,0.08);
        padding: 2rem 1.5rem;
        border: 1px solid #f3e9d2;
        max-width: 90vw;
        width: 100%;
        min-width: 260px;
        margin: 7vh auto 32px auto;
        transition: box-shadow 0.3s, transform 0.3s;
        box-sizing: border-box;
        word-break: break-word;
        overflow-wrap: break-word;
        min-height: 200px;
      }
      @media (min-width: 576px) {
        .post {
          max-width: 500px;
          padding: 2.5rem 2rem;
        }
      }
      @media (min-width: 768px) {
        .post {
          max-width: 600px;
          padding: 3rem 2.5rem;
        }
      }
    </style>
  </head>
  <body>
    <a href="feedpage.html" class="btn btn-outline-primary position-absolute m-3" style="top: 0; left: 0; z-index: 10;">
      &larr; Back
    </a>
    <div class="post">
      <!-- Post content will be loaded here by JS -->
    </div>
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.6/dist/js/bootstrap.min.js"></script>
    <script>
      function getPostIdFromUrl() {
        const params = new URLSearchParams(window.location.search);
        return params.get('id');
      }

      async function loadPost() {
        const postId = getPostIdFromUrl();
        if (!postId) {
          document.querySelector('.post').innerHTML = '<p>Post not found.</p>';
          return;
        }
        const response = await fetch(`http://localhost:20000/posts/${postId}`);
        const post = await response.json();
        const container = document.querySelector('.post');
        container.innerHTML = `
          <h1>${post.title}</h1>
          <p>${post.content}</p>
        `;
      }
      window.onload = loadPost;
    </script>
  </body>
</html>
