<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Login - My Diary</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.6/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-4Q6Gf2aSP4eDXB8Miphtr37CMZZQ5oXLH2yaXMJ2w8e2ZtHTl7GptT4jmndRuHDT" crossorigin="anonymous">
    <link rel="stylesheet" href="neobrutalism.css">
    <link rel="manifest" href="manifest.json">
    <script src="neo-popup.js"></script>
    <script src="config.js"></script>
  </head>
  <body class="d-flex justify-content-center align-items-center min-vh-100 py-4">
  

   
   
<form id="loginform">
<div class="neo-card">
  <div class="card-body">
    <h5 class="card-title text-center">welcome</h5>
    <p class="card-text text-center">please log-in to continue</p>

    <div class="mb-3">
  <label for="emailInput" class="form-label">Email address</label>
  <input type="email" class="form-control" id="emailInput" placeholder="name@example.com" name="email" required>
</div>
 <label for="inputPassword" class="form-label">Password</label>
<input type="password" id="inputPassword" class="form-control" aria-describedby="passwordHelpBlock" name="password" required>
<div id="passwordHelpBlock" class="form-text">
</div>
   <p>don't have an account? <a href="registerform.html">Register here</a></p>
<button  class="neo-btn w-100" id="loginbutton" type="submit">Log in </button>
    <div class="text-center mt-2">
      <a href="#" class="text-decoration-none" style="color:#1365bc;" onclick="showNeoPopup('Password recovery is not implemented yet. Please contact support.', 'warning');return false;">
        Forgot password?
      </a>
    </div>
  </div>
</div>
</form>



    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js" integrity="sha384-I7E8VVD/ismYTF4hNIPjVp/Zjvgyol6VFvRkX/vR+Vc4jQkC+hVqc2pM8ODewa9r" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.6/dist/js/bootstrap.min.js" integrity="sha384-RuyvpeZCxMJCqVUGFI0Do1mQrods/hhxYlcVfGPOfQtPJh0JCw12tUAZ/Mv10S7D" crossorigin="anonymous"></script>
 
 
 <script>
  const form = document.getElementById('loginform');

form.addEventListener('submit', async (e) => {
  e.preventDefault();

  const formData = new FormData(form);
  const plainData = Object.fromEntries(formData.entries());

  try {
    const response = await fetch(API_BASE_URL + '/userlogin', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json'
      },
      body: JSON.stringify(plainData)
    });

    const data = await response.json();

    if (response.ok) {
      localStorage.setItem('isLoggedIn', 'true');
      localStorage.setItem('userId', data.userId);
      localStorage.setItem('name', data.name);
      window.location.href = 'feedpage.html';
    } else {
      showNeoPopup('Login failed: ' + data.message, 'error');
    }
  } catch (error) {
    console.error('Error logging in:', error);
    showNeoPopup('Network error. Is the backend running?', 'error');
  }
});
  if (localStorage.getItem('darkMode') === 'true') {
    document.body.classList.add('dark-mode');
  }

  // Register PWA Service Worker
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('sw.js')
        .then(reg => console.log('PWA Service Worker registered!', reg))
        .catch(err => console.error('PWA Service Worker registration failed:', err));
    });
  }
</script>
</body>
</html>
