<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Login - My Diary</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.6/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-4Q6Gf2aSP4eDXB8Miphtr37CMZZQ5oXLH2yaXMJ2w8e2ZtHTl7GptT4jmndRuHDT" crossorigin="anonymous">
    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Edu+SA+Hand:wght@400..700&display=swap" rel="stylesheet">
     <style>
   body {
  font-family: 'Edu SA Hand', cursive;
  background: url('bgimg.jpg') no-repeat center center fixed;
  background-size: cover;
}
    #loginbutton {
      background: linear-gradient(90deg, #007bff 0%, #1365bc 100%);
      border: none;
      color: #fff;
      font-weight: 600;
      transition: background 0.3s, box-shadow 0.3s;
      box-shadow: 0 2px 8px rgba(0,123,255,0.15);
    }
    #loginbutton:hover, #loginbutton:focus {
      background: linear-gradient(90deg, #0056b3 0%, #174c8e 100%);
      box-shadow: 0 4px 16px rgba(0,123,255,0.25);
      color: #fff;
    }
.card {
  width: 100%;
  max-width: 500px;
  margin: 24px auto;
  border-radius: 10px;
  box-shadow: 0 8px 32px rgba(23,76,142,0.15), 0 2px 8px rgba(0,0,0,0.10);
  background: rgba(255, 255, 255, 0.511);
  border: none;
  padding: 0;
  position: relative;
  z-index: 2;
}
 
  </style>
  </head>
  <body class="d-flex justify-content-center align-items-center vh-100">
  

   
   
<form id="loginform">
<div class="card">
  <div class="card-body">
    <h5 class="card-title text-center">welcome</h5>
    <p class="card-text text-center">please log-in to continue</p>

    <div class="mb-3">
  <label for="emailInput" class="form-label">Email address</label>
  <input type="email" class="form-control" id="emailInput" placeholder="name@example.com" name="email" required>
</div>
 <label for="inputPassword" class="form-label">Password</label>
<input type="password" id="inputPassword" class="form-control" aria-describedby="passwordHelpBlock" name="password" required>
<div id="passwordHelpBlock" class="form-text">
</div>
   <p>don't have an account? <a href="registerform.html">Register here</a></p>
<button  class="btn btn-primary w-100" id="loginbutton" type="submit">Log in </button>
    <div class="text-center mt-2">
      <a href="#" class="text-decoration-none" style="color:#1365bc;" onclick="alert('Password recovery is not implemented yet. Please contact support.');return false;">
        Forgot password?
      </a>
    </div>
  </div>
</div>
</form>



    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js" integrity="sha384-I7E8VVD/ismYTF4hNIPjVp/Zjvgyol6VFvRkX/vR+Vc4jQkC+hVqc2pM8ODewa9r" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.6/dist/js/bootstrap.min.js" integrity="sha384-RuyvpeZCxMJCqVUGFI0Do1mQrods/hhxYlcVfGPOfQtPJh0JCw12tUAZ/Mv10S7D" crossorigin="anonymous"></script>
 
 
 <script>
  const form = document.getElementById('loginform');

form.addEventListener('submit', async (e) => {
  e.preventDefault();

  const formData = new FormData(form);
  const plainData = Object.fromEntries(formData.entries());

  const response = await fetch('http://localhost:20000/userlogin', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json'
    },
    body: JSON.stringify(plainData)
  });

  const data = await response.json();

 if (response.ok) {
  localStorage.setItem('isLoggedIn', 'true');
  localStorage.setItem('userId', data.userId); // <-- This is correct!
  localStorage.setItem('name', data.name);
  window.location.href = 'feedpage.html';
} else {
    alert('Login failed: ' + data.message);
  }
});
</script>
</body>
</html>
